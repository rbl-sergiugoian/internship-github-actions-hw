name: CD
run-name: Car Parts ${{ github.event.inputs.version || '1.0.0'}}

on:
  workflow_dispatch:
    inputs:
      version:
        description: "semver format"
        required: true
        default: "1.0.0"

permissions:
  contents: write

env:
  VERSION:  ${{ github.event.inputs.version || '1.0.0'}}
  VERSION_TAG: v${{ github.event.inputs.version || '1.0.0'}}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: resolve version
        shell: bash
        run: |
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "version must respect semver format: 1.2.3"
            exit 1
          fi
          if git rev-parse "refs/tags/${VERSION_TAG}" >/dev/null 2>&1; then
            echo "TAG_EXISTS=true" >> "$GITHUB_ENV"
            echo "DEPLOY_REF=${VERSION_TAG}" >> "$GITHUB_ENV"
            echo "using existing tag ${VERSION_TAG}"
          else
            echo "TAG_EXISTS=false" >> "$GITHUB_ENV"
            echo "DEPLOY_REF=${GITHUB_SHA}" >> "$GITHUB_ENV"
            echo "using latest code (${GITHUB_SHA})"
          fi

      - name: checkout deploy reference
        run: git checkout "${DEPLOY_REF}"

      - name: setup dotnet env
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: publish
        run: dotnet publish CarParts.API/CarParts.API.csproj -c Release -o ./publish

      - name: deploy to azure
        uses: azure/webapps-deploy@v3
        with:
          app-name: internshipnew2026
          publish-profile: ${{secrets.AZURE_PUBLISH_PROFILE}}
          package: ./publish

      - name: create git tag
        if: env.TAG_EXISTS == 'false'
        shell: bash
        run: |
          git tag "${VERSION_TAG}"
          git push origin "${VERSION_TAG}"