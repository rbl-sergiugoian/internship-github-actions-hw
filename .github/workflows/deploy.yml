name: CD
run-name: Car Parts ${{ github.event.inputs.version || '1.0.0'}}

on:
  workflow_dispatch:
    inputs:
      version:
        description: "semver format"
        required: true
        default: "1.0.0"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
    
      - name: setup dotnet env
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: publish
        run: dotnet publish CarParts.API/CarParts.API.csproj -c Release -o publish
